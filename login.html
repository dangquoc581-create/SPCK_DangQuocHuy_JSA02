<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Huy-Commerce</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Chào mừng trở lại</h2>
            <p class="subtitle">Vui lòng đăng nhập để tiếp tục mua sắm</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label for="login-email">Email (Gmail)</label>
                    <input type="email" id="login-email" placeholder="huy@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Đăng nhập</button>
            </form>
            <p class="auth-footer">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
