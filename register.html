<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - HuyCommerce</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Tạo tài khoản</h2>
            <p class="subtitle">Tham gia cùng chúng tôi để nhận ưu đãi tốt nhất</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="reg-username">Tên đăng nhập</label>
                    <input type="text" id="reg-username" placeholder="Ví dụ: huy_dang99" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Mật khẩu</label>
                    <input type="password" id="reg-password" placeholder="Tối thiểu 6 ký tự" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Xác nhận mật khẩu</label>
                    <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
                </div>
                <button type="submit" class="btn-primary">Đăng ký</button>
            </form>
            <p class="auth-footer">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
