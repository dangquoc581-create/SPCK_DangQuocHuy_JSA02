<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - HuyCommerce</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <nav class="navbar">
        <div class="logo">HuyCommerce</div>
        <div class="user-info">
            <span id="welcome-message"></span>
            <button id="logout-btn" class="btn-logout">Đăng xuất</button>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Thông tin tài khoản</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên đăng nhập:</label>
                            <input type="text" id="profile-username" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email:</label>
                            <input type="email" id="profile-email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu:</label>
                            <div class="input-group">
                                <input type="password" id="profile-password" class="form-control">
                                <button class="btn btn-outline-secondary" type="button" id="toggle-password">
                                    Hiện
                                </button>
                            </div>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button class="btn btn-primary" id="save-profile-btn">Lưu thay đổi</button>
                            <button class="btn btn-secondary" onclick="window.location.href='home.html'">Quay lại Trang chủ</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        // Logic riêng cho trang profile
        document.addEventListener('DOMContentLoaded', () => {
            loadUserProfile();
            setupPasswordToggle();
        });
    </script>
</body>
</html>
