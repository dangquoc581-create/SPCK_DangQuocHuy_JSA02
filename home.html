<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - Huy-Commerce</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>`
<body class="home-page">
    <nav class="navbar">
        <a href="home.html" class="logo">🛍️ Huy-Commerce</a>
        <div class="user-info">
            <span id="welcome-message"></span>
            <button id="logout-btn" class="btn-logout">Đăng xuất</button>
        </div>
    </nav>

    <main class="container">
        <div class="d-flex justify-content-between align-items-center my-4">
            <h2 class="mb-0">Sản phẩm nổi bật</h2>
            <button class="btn btn-dark px-4" data-bs-toggle="modal" data-bs-target="#addProductModal">
                + Đăng sản phẩm
            </button>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="product-list">
            <!-- Dữ liệu từ API sẽ được đổ vào đây -->
        </div>
    </main>

    <!-- Modal Đăng sản phẩm -->
    <div class="modal fade" id="addProductModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Đăng sản phẩm mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tên sản phẩm</label>
                            <input type="text" id="p-name" class="form-control" placeholder="Ví dụ: iPhone 15 Pro" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Giá tiền (VNĐ)</label>
                            <input type="number" id="p-price" class="form-control" placeholder="Ví dụ: 30000000" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Link hình ảnh</label>
                            <input type="url" id="p-image" class="form-control" placeholder="https://..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Mô tả ngắn</label>
                            <textarea id="p-desc" class="form-control" rows="3" placeholder="Thông số nổi bật..."></textarea>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary py-2">Xác nhận đăng tải</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script src="home.js"></script>
</body>
</html>
