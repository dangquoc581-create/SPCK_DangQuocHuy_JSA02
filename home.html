<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - HuyCommerce</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <nav class="navbar">
        <div class="logo">HuyCommerce</div>
        <div class="user-info">
            <span id="welcome-message"></span>
            <button onclick="window.location.href='login.html'" class="btn-logout">Đăng xuất</button>
        </div>
    </nav>

    <main class="container">
        <h2 class="my-4">Sản phẩm nổi bật</h2>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- Sản phẩm 1 -->
            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="https://mac24h.vn/images/detailed/95/76345_natural_titanium_update__2_.jpg" class="card-img-top" alt="iPhone 15 Pro Max" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">iPhone 15 Pro Max</h5>
                        <p class="card-text text-primary fw-bold">32.990.000đ</p>
                        <button class="btn btn-primary mt-auto">Mua ngay</button>
                    </div>
                </div>
            </div>
            <!-- Sản phẩm 2 -->
            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="https://bizweb.dktcdn.net/100/444/581/products/1-0ea3f92a-09c2-4d40-a838-e7f8c0a9bec4-203be3ba-1191-4f13-9d7c-536e80beb909.png?v=1717471153403" class="card-img-top" alt="MacBook Pro M3" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">MacBook Pro M3</h5>
                        <p class="card-text text-primary fw-bold">39.990.000đ</p>
                        <button class="btn btn-primary mt-auto">Mua ngay</button>
                    </div>
                </div>
            </div>
            <!-- Sản phẩm 3 -->
            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="https://apple.ngocnguyen.vn/cdn/images/202311/goods_img/moi-100-apple-watch-series-9-thep-gps-cellular-P15476-1698997130755.png" class="card-img-top" alt="Apple Watch Series 9" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Apple Watch Series 9</h5>
                        <p class="card-text text-primary fw-bold">10.490.000đ</p>
                        <button class="btn btn-primary mt-auto">Mua ngay</button>
                    </div>
                </div>
            </div>
            <!-- Sản phẩm 4 -->
            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRlP2kwIElDzAFIctvcQ8RCfW016cGDBJhScQ&s" class="card-img-top" alt="iPad Pro M2" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">iPad Pro M2</h5>
                        <p class="card-text text-primary fw-bold">20.190.000đ</p>
                        <button class="btn btn-primary mt-auto">Mua ngay</button>
                    </div>
                </div>
            </div>
            <!-- Sản phẩm 5 -->
            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTru49Q7wOcqqQJQDNW9S_CszjOPBRIiKLKJQ&s" class="card-img-top" alt="Samsung S24 Ultra" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Samsung S24 Ultra</h5>
                        <p class="card-text text-primary fw-bold">29.990.000đ</p>
                        <button class="btn btn-primary mt-auto">Mua ngay</button>
                    </div>
                </div>
            </div>
            <!-- Sản phẩm 6 -->
            <div class="col">
                <div class="card h-100 shadow-sm">
                    <img src="https://pos.nvncdn.com/91002e-15402/ps/20220601_UZxFH0gKhi8BtRLbp3A6TPGw.jpeg?v=1673600583" class="card-img-top" alt="Sony WH-1000XM5" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Sony WH-1000XM5</h5>
                        <p class="card-text text-primary fw-bold">6.990.000đ</p>
                        <button class="btn btn-primary mt-auto">Mua ngay</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- kiểm tra đăng nhập -->
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(user) {
            document.getElementById('welcome-message').innerText = "Xin chào, " + user.username;
        } else {
            window.location.href = "login.html"; // Chặn nếu chưa đăng nhập
        }
    </script>
</body>
</html>
