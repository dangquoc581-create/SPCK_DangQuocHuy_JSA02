<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Huy-Commerce</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <nav class="navbar">
        <a href="home.html" class="logo">🛍️ Huy-Commerce</a>
        <div class="user-info">
            <span id="welcome-message"></span>
            <button id="logout-btn" class="btn-logout">Đăng xuất</button>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row">
            <div class="col-md-6">
                <img id="detail-image" src="" class="img-fluid rounded shadow-sm" alt="Sản phẩm">
            </div>
            <div class="col-md-6">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="home.html">Trang chủ</a></li>
                        <li class="breadcrumb-item active" id="breadcrumb-name">Chi tiết</li>
                    </ol>
                </nav>
                <h1 id="detail-name" class="display-5 fw-bold"></h1>
                <p id="detail-price" class="h3 text-primary my-4"></p>
                <hr>
                <h5>Mô tả sản phẩm:</h5>
                <p id="detail-desc" class="lead text-muted"></p>
                <div class="d-grid gap-2 mt-5">
                    <button class="btn btn-primary btn-lg">Thêm vào giỏ hàng</button>
                    <a href="home.html" class="btn btn-outline-secondary">Quay lại danh sách</a>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="home.js"></script>
    <script src="product-detail.js"></script>
</body>
</html>
